<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Biergarten Status</title>
</head>
<body>
  <h1>Biergarten Status</h1>
  <div id="status">Lade Status...</div>

  <script>
    fetch('/api/status')
      .then(res => res.json())
      .then(data => {
        document.getElementById('status').innerText =
          data.open ? '🟢 Der Biergarten ist heute offen!' : '🔴 Der Biergarten ist heute leider geschlossen.';
      });
  </script>
</body>
</html>
